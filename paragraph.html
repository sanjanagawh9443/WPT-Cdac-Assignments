<html>
    <head>
        <title>paragraph color change </title>
    </head>
    <script>
        function changeColor() {
            var color document.getElementById("color").value;
           
            document.getElementById("p1").style.color = color;
            document.getElementById("p2").style.color = color;
            document.getElementById("p3").style.color = color;
            document.getElementById("p4").style.color = color;

            document.getElementById("p1").style.color = "bold";
            document.getElementById("p2").style.color = "bold";
            document.getElementById("p3").style.color = "bold";
            document.getElementById("p4").style.color = "bold";
            </script>
            <head>

                <body>

                    </body>
                    <p id="p1">paragraph 1</p>
                    <p id="p2">paragraph 2</p>
                    <p id="p3">paragraph 3</p>
                    <p id="p4">paragraph 4</p>

                    <br>

                    Select color:
                    <input type="color" id="color">
                    <button onclick="changeColor()">Change Color</button>
                    

                    </body>
                    </html>










        }
</html>
