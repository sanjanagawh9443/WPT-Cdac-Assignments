<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>

    <style>
        .textbox {
            margin-left: 20px;
            margin-right: 20px;
            border: 3px solid blue;
            padding: 5px;
        }

        .image-style {
            margin-top: 30px;
            border: 4px solid red;
            border-radius: 20px;
        }
    </style>

</head>
<body>

    <!-- 3 Text Fields in One Line -->
    <input type="text" class="textbox" placeholder="First Name">
    <input type="text" class="textbox" placeholder="Last Name">
    <input type="text" class="textbox" placeholder="City">

    <br><br>

    <!-- Image -->
    <img src="https://via.placeholder.com/200" class="image-style" alt="Sample Image">

</body>
</html>
