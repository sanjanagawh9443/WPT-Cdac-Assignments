<!DOCTYPE html>
<html>
<head>
<title>Div Animation</title>

<style>

#box{
width:50px;
height:50px;
background:red;
position:relative;
}

.animate{
animation:movebox 3s forwards;
}

@keyframes movebox{
from{
left:0px;
width:50px;
height:50px;
opacity:1;
}
to{
left:300px;
width:100px;
height:100px;
opacity:1;
}
}

.fadeout{
opacity:0;
transition:1s;
}

.fadein{
opacity:1;
transition:1s;
}

</style>

</head>

<body>

<h2>Animation Example</h2>

<div id="box"></div>
<br>

<button onclick="start()">Start</button><br><br>
<button onclick="stop()">Stop</button>


<script>
function start(){
document.getElementById("box").classList.add("animate");
}

function stop(){
document.getElementById("box").style.animation="none";
}

function fadeout(){
document.getElementById("box").classList.add("fadeout");
}

function fadein(){
document.getElementById("box").classList.remove("fadeout");
}

</script>

</body>
</html>
