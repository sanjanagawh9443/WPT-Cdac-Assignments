<!DOCTYPE html>
<html>

<head>
    <title>Pattern</title>
</head>

<body>
    <script>
        for (let i = 3; i >= 1; i--) {
            let row = "";
            for (let j = 1; j <= i; j++) {
                row += "*";
            }
            console.log(row);

        }
    </script>
</body>

</html>
