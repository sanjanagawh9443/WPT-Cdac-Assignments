<!DOCTYPE html>
<html>
    <head>
        <title>Tables of number</title>
    </head>
<body>
 <input type="number" id="num1" name="num1">    
<button onclick="getTable()">Get Table</button>
<div id="result">

</div>
<script>
function getTable(){
    let number = document.getElementById("num1").value;
    let output = "";
    for(let i=1;i<=10;i++){
        output += number + " x " + i + " = " + (number * i) + "<br>";
    }
    document.getElementById("result").innerHTML = output;
    }
</script>

</body>
</html>
